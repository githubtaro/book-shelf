<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BookShelf - 蔵書管理</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #fafaf9; overscroll-behavior: none; }
  .safe-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
  #scanner-region video { border-radius: 12px; }
  #scanner-region { position: relative; min-height: 0; transition: min-height 0.3s ease; }
  /* iOS Safari: video要素の表示を確保 */
  #scanner-region video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  #scanner-region img { display: none !important; } /* QRスキャン枠の画像を非表示 */
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── IndexedDB wrapper ───
const IDB = {
  db: null,
  async open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open("BookShelfDB", 2);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("books")) {
          const store = db.createObjectStore("books", { keyPath: "id" });
          store.createIndex("isbn", "isbn", { unique: false });
          store.createIndex("title", "title", { unique: false });
          store.createIndex("locationId", "locationId", { unique: false });
        }
        if (!db.objectStoreNames.contains("locations")) db.createObjectStore("locations", { keyPath: "id" });
        if (!db.objectStoreNames.contains("categories")) db.createObjectStore("categories", { keyPath: "id" });
      };
      req.onsuccess = (e) => { IDB.db = e.target.result; resolve(); };
      req.onerror = () => reject(req.error);
    });
  },
  async getAll(store) {
    return new Promise((resolve, reject) => {
      const tx = IDB.db.transaction(store, "readonly");
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
  async put(store, data) {
    return new Promise((resolve, reject) => {
      const tx = IDB.db.transaction(store, "readwrite");
      tx.objectStore(store).put(data);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async del(store, id) {
    return new Promise((resolve, reject) => {
      const tx = IDB.db.transaction(store, "readwrite");
      tx.objectStore(store).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async clear(store) {
    return new Promise((resolve, reject) => {
      const tx = IDB.db.transaction(store, "readwrite");
      tx.objectStore(store).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
};

// ─── API lookup ───
async function lookupISBN(isbn) {
  const cleaned = isbn.replace(/[-\s]/g, "");
  let result = null;
  try {
    const res = await fetch("https://www.googleapis.com/books/v1/volumes?q=isbn:" + cleaned);
    const data = await res.json();
    if (data.totalItems > 0) {
      const v = data.items[0].volumeInfo;
      result = {
        isbn: cleaned, title: v.title || "", author: (v.authors || []).join(", "),
        publisher: v.publisher || "", publishedDate: v.publishedDate || "",
        description: v.description || "", coverUrl: (v.imageLinks?.thumbnail || "").replace("http:", "https:"),
        pageCount: v.pageCount || null, category: (v.categories || [])[0] || "",
        listPrice: null, source: "google"
      };
    }
  } catch(e) { console.error("Google Books error:", e); }
  if (!result || !result.title) {
    try {
      const res = await fetch("https://api.openbd.jp/v1/get?isbn=" + cleaned);
      const data = await res.json();
      if (data && data[0]) {
        const s = data[0].summary;
        let price = null;
        try {
          const onix = data[0].onix;
          const supplies = onix?.ProductSupply;
          if (supplies) {
            const arr = Array.isArray(supplies) ? supplies : [supplies];
            for (const sup of arr) {
              const p = sup?.SupplyDetail?.Price;
              if (p) { const pa = Array.isArray(p) ? p : [p]; for (const pi of pa) { if (pi?.PriceAmount) { price = parseInt(pi.PriceAmount); break; } } }
              if (price) break;
            }
          }
        } catch(e) {}
        result = {
          isbn: cleaned, title: s?.title || result?.title || "",
          author: s?.author || result?.author || "", publisher: s?.publisher?.name || s?.publisher || result?.publisher || "",
          publishedDate: s?.pubdate || result?.publishedDate || "",
          description: data[0].onix?.CollateralDetail?.TextContent?.[0]?.Text || result?.description || "",
          coverUrl: s?.cover || result?.coverUrl || "", pageCount: result?.pageCount || null,
          category: result?.category || "", listPrice: price || result?.listPrice || null,
          source: result?.source === "google" ? "google+openbd" : "openbd"
        };
      }
    } catch(e) { console.error("openBD error:", e); }
  }
  return result;
}

// ─── Default data ───
const DEFAULT_LOCATIONS = [
  { id: "loc_1", name: "リビング", sortOrder: 1 },
  { id: "loc_2", name: "書斎", sortOrder: 2 },
  { id: "loc_3", name: "寝室", sortOrder: 3 },
  { id: "loc_4", name: "子供部屋", sortOrder: 4 },
  { id: "loc_5", name: "その他", sortOrder: 99 },
];
const DEFAULT_CATEGORIES = [
  { id: "cat_1", name: "漫画" }, { id: "cat_2", name: "小説・文学" },
  { id: "cat_3", name: "ビジネス" }, { id: "cat_4", name: "技術書・IT" },
  { id: "cat_5", name: "趣味・実用" }, { id: "cat_6", name: "絵本・児童書" },
  { id: "cat_7", name: "雑誌" }, { id: "cat_8", name: "学習・参考書" },
  { id: "cat_9", name: "その他" },
];

// ─── App State ───
let state = { page: "home", books: [], locations: [], categories: [], pageData: null, scannerActive: false };
let html5QrCode = null;

function setState(updates) { Object.assign(state, updates); render(); }
function navigate(page, data) { stopScanner(); setState({ page, pageData: data || null }); window.scrollTo(0, 0); }

// ─── Data operations ───
async function loadData() {
  await IDB.open();
  let [books, locations, categories] = await Promise.all([IDB.getAll("books"), IDB.getAll("locations"), IDB.getAll("categories")]);
  books = books.filter(b => !b.deletedAt).sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  if (locations.length === 0) { for (const l of DEFAULT_LOCATIONS) await IDB.put("locations", l); locations = DEFAULT_LOCATIONS; }
  if (categories.length === 0) { for (const c of DEFAULT_CATEGORIES) await IDB.put("categories", c); categories = DEFAULT_CATEGORIES; }
  locations.sort((a, b) => a.sortOrder - b.sortOrder);
  setState({ books, locations, categories });
}
async function refreshBooks() {
  const books = (await IDB.getAll("books")).filter(b => !b.deletedAt).sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  setState({ books });
}
async function refreshLocations() {
  const locations = (await IDB.getAll("locations")).sort((a, b) => a.sortOrder - b.sortOrder);
  setState({ locations });
}

// ─── Scanner ───
function stopScanner() {
  if (html5QrCode) {
    try { html5QrCode.stop().catch(() => {}); } catch(e) {}
    html5QrCode = null;
  }
  state.scannerActive = false;
  // DOM直接操作でUIを戻す
  const el = document.getElementById("scanner-region");
  if (el) { el.style.minHeight = "0"; el.style.background = "transparent"; el.innerHTML = ""; }
  const btn = document.getElementById("scanner-toggle");
  if (btn) { btn.textContent = "カメラを起動してスキャン"; btn.classList.remove("bg-stone-100"); }
}

function startScanner() {
  stopScanner();
  const el = document.getElementById("scanner-region");
  if (!el) return;
  // iOS Safari対策: 明示的にサイズを確保
  el.style.minHeight = "300px";
  el.style.width = "100%";
  el.style.position = "relative";
  el.style.overflow = "hidden";
  el.style.borderRadius = "12px";
  el.style.background = "#1c1917";

  html5QrCode = new Html5Qrcode("scanner-region", { verbose: false });

  const screenW = Math.min(window.innerWidth - 48, 640);
  const qrboxW = Math.min(250, screenW - 40);

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: qrboxW, height: Math.floor(qrboxW * 0.4) },
      aspectRatio: 4 / 3,
      videoConstraints: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 },
      }
    },
    (decoded) => {
      const cleaned = decoded.replace(/[-\s]/g, "");
      if (/^\d{10,13}$/.test(cleaned)) {
        stopScanner();
        const inp = document.getElementById("isbn-input");
        if (inp) inp.value = cleaned;
        handleISBNLookup(cleaned);
      }
    },
    () => {}
  ).then(() => {
    state.scannerActive = true;
    // iOS Safari: video要素にplaysinline属性を追加
    const video = el.querySelector("video");
    if (video) {
      video.setAttribute("playsinline", "true");
      video.setAttribute("webkit-playsinline", "true");
      video.style.width = "100%";
      video.style.height = "100%";
      video.style.objectFit = "cover";
      video.style.borderRadius = "12px";
    }
    // ボタンテキストを更新（renderを呼ばずにDOM直接操作）
    const btn = document.getElementById("scanner-toggle");
    if (btn) { btn.textContent = "カメラを停止"; btn.classList.add("bg-stone-100"); }
    const errEl = document.getElementById("scanner-error");
    if (errEl) errEl.textContent = "";
  }).catch(err => {
    console.error("Scanner error:", err);
    el.style.minHeight = "0";
    el.style.background = "transparent";
    const errEl = document.getElementById("scanner-error");
    if (errEl) errEl.textContent = "カメラを起動できませんでした。ブラウザ設定でカメラを許可しているか確認してください。エラー: " + (err?.message || err);
  });
}

async function handleISBNLookup(isbn) {
  const cleaned = isbn.replace(/[-\s]/g, "");
  if (cleaned.length !== 10 && cleaned.length !== 13) {
    showError("ISBNは10桁または13桁で入力してください"); return;
  }
  showLoading(true);
  const result = await lookupISBN(cleaned);
  showLoading(false);
  if (result && result.title) { navigate("confirm", result); }
  else { showError("書籍情報が見つかりませんでした"); }
}

function showError(msg) { const el = document.getElementById("scan-error"); if (el) { el.textContent = msg; el.classList.remove("hidden"); } }
function showLoading(on) { const el = document.getElementById("scan-loading"); if (el) el.classList.toggle("hidden", !on); }

// ─── Render helpers ───
function esc(s) { if (!s) return ""; const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function coverFallback(el, title, size) {
  const sizes = { sm: "w-10 h-14", md: "w-16 h-22", lg: "w-28 h-40" };
  const tsizes = { sm: "text-[8px]", md: "text-[10px]", lg: "text-xs" };
  const div = document.createElement("div");
  div.className = (sizes[size] || sizes.md) + " bg-stone-200 rounded shadow-sm flex items-center justify-center p-1";
  const span = document.createElement("span");
  span.className = (tsizes[size] || tsizes.md) + " text-stone-400 text-center leading-tight";
  span.textContent = (title || "No Image").slice(0, 12);
  div.appendChild(span);
  el.replaceWith(div);
}
function coverHTML(url, title, size = "md") {
  const sizes = { sm: "w-10 h-14", md: "w-16 h-22", lg: "w-28 h-40" };
  const tsizes = { sm: "text-[8px]", md: "text-[10px]", lg: "text-xs" };
  if (!url) {
    return `<div class="${sizes[size]} bg-stone-200 rounded shadow-sm flex items-center justify-center p-1"><span class="${tsizes[size]} text-stone-400 text-center leading-tight">${esc((title || "No Image").slice(0, 12))}</span></div>`;
  }
  const safeTitle = (title || "").replace(/'/g, "&#39;").replace(/"/g, "&#34;");
  return `<img src="${esc(url)}" alt="${esc(title)}" class="${sizes[size]} object-cover rounded shadow-sm bg-stone-100" onerror="coverFallback(this,'${safeTitle}','${size}')">`;
}
function locName(id) { const l = state.locations.find(l => l.id === id); return l ? l.name : ""; }
function catName(id) { const c = state.categories.find(c => c.id === id); return c ? c.name : ""; }

// ─── Page renderers ───
function renderHome() {
  const dupeCount = Object.values(state.books.reduce((a, b) => { if (b.isbn) a[b.isbn] = (a[b.isbn] || 0) + 1; return a; }, {})).filter(c => c > 1).length;
  const totalQty = state.books.reduce((s, b) => s + (b.quantity || 1), 0);
  const recent = state.books.slice(0, 5);
  return `
    <div class="bg-gradient-to-br from-amber-800 via-amber-900 to-stone-900 text-white px-5 pt-8 pb-10">
      <div class="flex items-center gap-2 mb-1"><svg class="w-6 h-6 text-amber-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h1 class="text-xl font-bold tracking-tight">BookShelf</h1></div>
      <p class="text-amber-200/70 text-xs">家族の蔵書管理アプリ</p>
      <div class="mt-6 grid grid-cols-3 gap-3">
        <div class="bg-white/10 rounded-xl px-3 py-3 text-center backdrop-blur"><div class="text-2xl font-bold">${state.books.length}<span class="text-sm ml-0.5 font-normal text-amber-200/60">冊</span></div><div class="text-[10px] text-amber-200/60 mt-0.5">総蔵書数</div></div>
        <div class="bg-white/10 rounded-xl px-3 py-3 text-center backdrop-blur"><div class="text-2xl font-bold">${state.locations.length}<span class="text-sm ml-0.5 font-normal text-amber-200/60">箇所</span></div><div class="text-[10px] text-amber-200/60 mt-0.5">保管場所</div></div>
        <div class="bg-white/10 rounded-xl px-3 py-3 text-center backdrop-blur"><div class="text-2xl font-bold">${totalQty}<span class="text-sm ml-0.5 font-normal text-amber-200/60">冊</span></div><div class="text-[10px] text-amber-200/60 mt-0.5">総冊数</div></div>
      </div>
    </div>
    <div class="px-4 -mt-4 space-y-3">
      <button onclick="navigate('scan')" class="w-full bg-amber-700 hover:bg-amber-800 text-white rounded-xl px-4 py-4 flex items-center gap-3 shadow-lg transition-colors">
        <div class="bg-amber-600 rounded-lg p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></div>
        <div class="text-left"><div class="font-bold text-sm">本を登録する</div><div class="text-amber-200/70 text-[11px]">バーコードスキャンまたはISBN入力</div></div>
      </button>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="navigate('books')" class="bg-white rounded-xl px-4 py-4 text-left shadow-sm border border-stone-100 hover:border-amber-200 transition-colors">
          <svg class="w-5 h-5 text-amber-700 mb-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <div class="text-sm font-bold text-stone-800">蔵書一覧</div><div class="text-[11px] text-stone-400">${state.books.length}冊登録済み</div></button>
        <button onclick="navigate('duplicates')" class="bg-white rounded-xl px-4 py-4 text-left shadow-sm border border-stone-100 hover:border-amber-200 transition-colors">
          <svg class="w-5 h-5 mb-2 ${dupeCount > 0 ? 'text-orange-500' : 'text-stone-300'}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <div class="text-sm font-bold text-stone-800">重複チェック</div><div class="text-[11px] text-stone-400">${dupeCount > 0 ? dupeCount + '件の重複ISBN' : '重複なし'}</div></button>
      </div>
      <button onclick="navigate('settings')" class="w-full bg-white rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm border border-stone-100 text-left hover:border-amber-200 transition-colors">
        <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="text-sm text-stone-600">データのバックアップ / 復元</span></button>
      ${recent.length > 0 ? `<div class="pt-2"><h2 class="text-xs font-bold text-stone-400 uppercase tracking-wider mb-2 px-1">最近登録した本</h2><div class="space-y-2">
        ${recent.map(b => `<button onclick="navigate('detail', state.books.find(x=>x.id==='${b.id}'))" class="w-full bg-white rounded-xl px-3 py-2.5 flex items-center gap-3 shadow-sm border border-stone-100 text-left hover:border-amber-200 transition-colors">
          ${coverHTML(b.coverUrl, b.title, "sm")}
          <div class="flex-1 min-w-0"><div class="text-sm font-medium text-stone-800 truncate">${esc(b.title)}</div><div class="text-[11px] text-stone-400 truncate">${esc(b.author || "")}</div></div></button>`).join("")}
      </div></div>` : ""}
    </div><div class="h-8"></div>`;
}

function renderScan() {
  return `
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-stone-200 px-4 py-3"><h1 class="text-base font-bold text-stone-800">本を登録</h1></header>
    <div class="px-4 py-6 space-y-4 fade-in">
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100">
        <p class="text-xs text-stone-500 mb-3">カメラでバーコードをスキャンするか、ISBNを手入力してください</p>
        <div id="scanner-region" class="mb-3 rounded-xl overflow-hidden"></div>
        <div id="scanner-error" class="text-xs text-red-600 mb-2"></div>
        <button onclick="state.scannerActive ? stopScanner() : startScanner();"
          class="w-full border border-amber-200 text-amber-700 rounded-lg py-2 text-sm font-medium mb-3 hover:bg-amber-50 transition-colors"
          id="scanner-toggle">カメラを起動してスキャン</button>
        <div class="flex gap-2">
          <input id="isbn-input" type="text" inputmode="numeric" placeholder="978-4-XXXX-XXXX-X"
            class="flex-1 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30"
            onkeydown="if(event.key==='Enter')handleISBNLookup(this.value)">
          <button onclick="handleISBNLookup(document.getElementById('isbn-input').value)"
            class="bg-amber-700 hover:bg-amber-800 text-white px-4 rounded-lg text-sm font-medium transition-colors whitespace-nowrap">検索</button>
        </div>
        <div id="scan-error" class="hidden mt-2 text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
        <div id="scan-loading" class="hidden mt-2 text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-2 text-center">検索中...</div>
      </div>
      <div class="bg-amber-50 rounded-2xl p-4 border border-amber-100">
        <h3 class="text-xs font-bold text-amber-800 mb-2">ISBN の見つけ方</h3>
        <ul class="text-[11px] text-amber-700 space-y-1">
          <li>・本の裏表紙のバーコード下にある13桁の数字</li>
          <li>・「978」または「979」で始まります</li>
          <li>・古い本は10桁の場合もあります</li>
        </ul>
      </div>
      <button onclick="navigate('confirm', {isbn:'',title:'',author:'',publisher:'',publishedDate:'',description:'',coverUrl:'',pageCount:null,category:'',listPrice:null,source:'manual'})"
        class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3.5 text-sm text-stone-600 hover:border-amber-300 transition-colors text-center">バーコードなしの本を手動登録</button>
    </div>`;
}

function renderConfirm() {
  const d = state.pageData || {};
  const dupes = d.isbn ? state.books.filter(b => b.isbn === d.isbn) : [];
  return `
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-stone-200 px-4 py-3 flex items-center gap-3">
      <button onclick="navigate('scan')" class="text-stone-500 -ml-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <h1 class="text-base font-bold text-stone-800">登録内容の確認</h1></header>
    <div class="px-4 py-4 space-y-4 fade-in">
      ${dupes.length > 0 ? `<div class="bg-orange-50 border border-orange-200 rounded-xl px-4 py-3 text-xs text-orange-700"><b>同じISBNの本が${dupes.length}冊登録済みです。</b></div>` : ""}
      <div class="flex justify-center">${coverHTML(d.coverUrl, d.title, "lg")}</div>
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100 space-y-3" id="confirm-form">

function exportData() {
  const data = { books: state.books, locations: state.locations, categories: state.categories, exportedAt: new Date().toISOString(), version: "1.0" };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "bookshelf_backup_" + new Date().toISOString().slice(0, 10) + ".json"; a.click();
}

async function importData(e) {
  const file = e.target.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.books) throw new Error("Invalid format");
      if (!confirm(`${data.books.length}冊のデータをインポートしますか？`)) return;
      for (const b of data.books) await IDB.put("books", b);
      if (data.locations) for (const l of data.locations) await IDB.put("locations", l);
      if (data.categories) for (const c of data.categories) await IDB.put("categories", c);
      await loadData();
      const el = document.getElementById("import-status");
      if (el) { el.textContent = data.books.length + "冊のデータをインポートしました"; el.classList.remove("hidden"); }
    } catch(err) { alert("インポート失敗: " + err.message); }
  };
  reader.readAsText(file);
}

async function clearAllData() {
  if (!confirm("全てのデータを削除しますか？")) return;
  if (!confirm("本当に全データを削除してよろしいですか？")) return;
  await IDB.clear("books"); await refreshBooks(); render();
}

    { id: "home", label: "ホーム", icon: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
    { id: "scan", label: "スキャン", icon: '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>' },
    { id: "books", label: "蔵書一覧", icon: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>' },
    { id: "locations", label: "場所管理", icon: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>' },
  ];
  return `<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 flex justify-around py-2 px-1 z-50 safe-pb">
    ${tabs.map(t => `<button onclick="navigate('${t.id}')" class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg ${state.page === t.id ? 'text-amber-700' : 'text-stone-400'}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${t.icon}</svg>
      <span class="text-[10px] font-medium">${t.label}</span></button>`).join("")}
  </nav>`;
}

// ─── Main render ───
function render() {
  const renderers = { home: renderHome, scan: renderScan, confirm: renderConfirm, books: renderBooks,
    detail: renderDetail, edit: renderEdit, locations: renderLocations, duplicates: renderDuplicates, settings: renderSettings };
  const content = (renderers[state.page] || renderHome)();
  document.getElementById("app").innerHTML = `
    <div class="flex flex-col min-h-screen bg-stone-50">
      <div class="flex-1 pb-20">${content}</div>
      ${renderNav()}
    </div>`;
}

// ─── Init ───
loadData().then(() => render());
</script>
</body>
